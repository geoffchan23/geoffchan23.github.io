name: Comic Factory — Publish

on:
  schedule:
    # 09:15 America/New_York (13:15 UTC during EDT, 14:15 UTC during EST).
    # GitHub cron runs in UTC with no DST adjustment, so this targets roughly
    # 9:15am ET year-round with ±1hr drift at DST transitions. Close enough
    # for a comic page.
    - cron: '15 13 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: publish-comics
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run publisher
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/comic_publish.py
