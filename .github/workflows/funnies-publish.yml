name: Funnies — daily publish

on:
  schedule:
    # 13:00 UTC daily = 09:00 ET = 06:00 PT.
    # Runs after midnight in every North American timezone.
    - cron: '0 13 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: "Target ET date (YYYY-MM-DD). Default: yesterday in ET."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run publish script
        run: |
          if [ -n "${{ inputs.date }}" ]; then
            python scripts/funnies_publish.py --date "${{ inputs.date }}"
          else
            python scripts/funnies_publish.py
          fi

      - name: Commit and push if a new issue was written
        run: |
          if [ -z "$(git status --porcelain _funnies/)" ]; then
            echo "No new issue to commit."
            exit 0
          fi
          git config user.name "Geoff Chan"
          git config user.email "geoffchan23@gmail.com"
          # Derive the issue date from the file the script just wrote, not from
          # `ls -1t` (whose mtime ordering is fragile across runners).
          new_issue=$(git status --porcelain _funnies/ | awk '/^\?\?|^[ M]?A|^A/ {print $NF}' | head -n1)
          issue_date=$(basename "$new_issue" .md)
          git add _funnies/
          git commit -m "funnies: publish ${issue_date}"
          # Pull-rebase before push to avoid colliding with the hourly
          # usage-stats publisher (same repo, same branch, separate cron).
          git pull --rebase --autostash origin main
          git push
