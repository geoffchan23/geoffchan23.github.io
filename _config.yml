title: Geoff Chan
description: Geoff Chan is an AI product engineer and ex-founder. Head of Product & AI at Raven.ai, previously founder of Stack Five and engineering lead at Code4rena.
url: https://geoffreychan.com
baseurl: ""

# Build settings
markdown: kramdown
permalink: pretty
plugins:
  - jekyll-sitemap
  - jekyll-redirect-from
collections:
  art:
    output: true
    permalink: /art/:title/

exclude:
  - docs/
  - README.md
  - _art/README.md
  - CLAUDE.md
  - .claude/
  - Gemfile
  - Gemfile.lock

defaults:
  - scope:
      path: ""
      type: art
    values:
      layout: art
